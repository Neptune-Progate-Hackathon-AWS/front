project:
  name: コンビニトイレマップ
  description: コンビニのトイレ位置情報を共有・検索するWebアプリケーション
  version: "1.0.0"

# ============================================================
# リポジトリ構成
# ============================================================
repositories:
  frontend:
    language: TypeScript
    framework: React (Vite)
    description: SPA。地図UI・フォーム・ナビゲーション表示
    hosting: AWS Amplify Hosting
    code_generation:
      tool: openapi-typescript
      source: openapi.yml

  backend:
    language: Go
    framework: net/http (標準ライブラリ) + chi router
    description: API Gateway + Lambda で動作するAPIサーバー
    deployment: SAM / CDK でパッケージ → Lambda
    code_generation:
      tool: oapi-codegen
      source: openapi.yml

# ============================================================
# AWSサービス構成
# ============================================================
aws:
  region: ap-northeast-1

  services:
    # --- 認証 ---
    cognito:
      service: Amazon Cognito
      role: ユーザー認証・JWT発行
      config:
        user_pool:
          sign_in_attributes: [email]
          password_policy:
            min_length: 8
            require_uppercase: true
            require_lowercase: true
            require_numbers: true
            require_symbols: false
          mfa: optional
          verification: email
        app_client:
          auth_flows:
            - USER_PASSWORD_AUTH
            - REFRESH_TOKEN_AUTH
          token_validity:
            access_token: 1h
            id_token: 1h
            refresh_token: 30d

    # --- API ---
    api_gateway:
      service: Amazon API Gateway
      role: REST APIエンドポイント・JWT認証・スロットリング
      config:
        type: REST
        authorizer: Cognito User Pool Authorizer
        cors:
          allowed_origins: ["*"]
          allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
          allowed_headers: [Authorization, Content-Type]
        throttling:
          rate_limit: 100
          burst_limit: 200

    lambda:
      service: AWS Lambda
      role: APIビジネスロジック実行
      config:
        runtime: provided.al2023
        architecture: arm64
        memory: 256
        timeout: 30
        handler: bootstrap

    # --- データストア ---
    dynamodb:
      service: Amazon DynamoDB
      role: メインデータストア
      tables:
        - name: Stores
          description: コンビニ店舗マスタ
          partition_key: { name: storeId, type: S }
          gsi:
            - name: GeoIndex
              description: 位置情報検索用（geohash）
              partition_key: { name: geohash, type: S }
              sort_key: { name: storeId, type: S }

        - name: Toilets
          description: トイレ情報
          partition_key: { name: toiletId, type: S }
          gsi:
            - name: StoreIndex
              description: 店舗IDで検索
              partition_key: { name: storeId, type: S }
            - name: GeoIndex
              description: 位置情報検索用（geohash）
              partition_key: { name: geohash, type: S }
              sort_key: { name: toiletId, type: S }
            - name: StatusIndex
              description: ステータスで絞り込み
              partition_key: { name: status, type: S }
              sort_key: { name: createdAt, type: S }

        - name: Reports
          description: 虚偽報告（トイレなし報告）
          partition_key: { name: reportId, type: S }
          gsi:
            - name: ToiletIndex
              description: トイレIDで検索
              partition_key: { name: toiletId, type: S }
              sort_key: { name: createdAt, type: S }

        - name: Devices
          description: プッシュ通知用デバイストークン
          partition_key: { name: userId, type: S }
          sort_key: { name: platform, type: S }

    s3:
      service: Amazon S3
      role: 画像保存
      buckets:
        - name: toilet-map-images
          config:
            versioning: false
            lifecycle:
              - prefix: tmp/
                expiration_days: 1
                description: presigned URL用の一時領域
            cors:
              allowed_origins: ["*"]
              allowed_methods: [PUT]
              allowed_headers: ["*"]
              max_age_seconds: 3600

    # --- AI / ML ---
    rekognition:
      service: Amazon Rekognition
      role: 画像審査（トイレ画像判定）
      usage:
        - name: トイレ登録審査
          description: |
            投稿画像がトイレ関連かどうかを DetectLabels で判定。
            "Bathroom", "Toilet", "Restroom" 等のラベルが
            一定信頼度以上で検出されれば審査通過。
          api: DetectLabels
          confidence_threshold: 70

        - name: 虚偽報告審査
          description: |
            「トイレがない」証拠画像を DetectLabels で判定。
            店舗内部の画像であることを確認。
          api: DetectLabels
          confidence_threshold: 60

    bedrock:
      service: Amazon Bedrock
      role: AI提案文生成
      usage:
        - name: ルート提案文生成
          description: |
            周辺トイレの距離・所要時間・混雑度等を入力として、
            ユーザーに最適なトイレへの行き方を自然言語で提案。
          model: anthropic.claude-3-haiku-20240307-v1:0
          max_tokens: 500

    location_service:
      service: Amazon Location Service
      role: 地図・経路計算
      usage:
        - name: 経路計算
          description: 現在位置から各トイレまでの徒歩ルートを計算
          api: CalculateRoute
          travel_mode: Walking
        - name: ジオコーディング
          description: 住所から座標への変換（店舗データ登録時）
          api: SearchPlaceIndexForText

    # --- 通知・イベント ---
    eventbridge:
      service: Amazon EventBridge
      role: イベント駆動連携
      rules:
        - name: ToiletAbsenceAlert
          description: トイレ不在エリア検知時にプッシュ通知をトリガー
          source: toilet-map.location-check
          detail_type: ToiletAbsenceDetected
          target: End User Messaging Push → プッシュ通知

        - name: ReportThresholdReached
          description: 虚偽報告3件到達時にトイレ自動削除をトリガー
          source: toilet-map.reports
          detail_type: ReportThresholdReached
          target: Lambda (トイレステータス更新)

    end_user_messaging_push:
      service: AWS End User Messaging Push
      role: プッシュ通知配信
      config:
        channels:
          - platform: FCM
            description: Android / Web プッシュ
          - platform: APNs
            description: iOS プッシュ
        integration:
          event_source: EventBridge
          description: |
            EventBridge からのイベントをトリガーに
            End User Messaging Push でプッシュ通知を送信。
            SNS は必要に応じてファンアウト用に併用。

    sqs:
      service: Amazon SQS
      role: 非同期処理キュー（必要に応じて）
      queues:
        - name: image-moderation-queue
          description: 画像審査の非同期処理用（高負荷時のバッファ）
          visibility_timeout: 60
          dlq: image-moderation-dlq

# ============================================================
# 機能フロー
# ============================================================
flows:
  # --- ① トイレ登録 ---
  toilet_registration:
    name: トイレ情報登録
    steps:
      - actor: ユーザー
        action: ログイン
        service: Cognito
        detail: JWT取得

      - actor: ユーザー
        action: マップからコンビニを選択
        service: Frontend
        detail: Location Service の地図上で店舗タップ

      - actor: ユーザー
        action: presigned URL取得
        service: API Gateway → Lambda → S3
        endpoint: POST /images/presigned-url

      - actor: ユーザー
        action: トイレ画像をS3にアップロード
        service: S3
        detail: presigned PUT URL で直接アップロード

      - actor: ユーザー
        action: トイレ情報フォーム送信
        service: API Gateway → Lambda
        endpoint: POST /toilets
        detail: |
          imageKey, maleCount, femaleCount,
          multipurposeCount, requiresPermission, note

      - actor: Lambda
        action: Rekognition で画像審査
        service: Rekognition
        detail: |
          DetectLabels → "Toilet"/"Bathroom" ラベル検出
          信頼度70%以上で通過

      - actor: Lambda
        action: DynamoDB にトイレ情報保存
        service: DynamoDB
        detail: status=active でマップに反映
        condition: 審査通過時

      - actor: Lambda
        action: 422エラー返却
        condition: 審査不通過時

  # --- ② 虚偽報告・自動削除 ---
  false_report:
    name: 虚偽報告によるトイレ削除
    steps:
      - actor: ユーザー
        action: 「トイレなし」証拠画像をS3にアップロード
        service: S3
        endpoint: POST /images/presigned-url

      - actor: ユーザー
        action: 報告送信
        service: API Gateway → Lambda
        endpoint: POST /toilets/{toiletId}/reports
        detail: imageKey + reason

      - actor: Lambda
        action: Rekognition で証拠画像審査
        service: Rekognition
        detail: 店舗内部画像であることを確認

      - actor: Lambda
        action: DynamoDB に報告保存
        service: DynamoDB
        detail: status=accepted で保存
        condition: 審査通過時

      - actor: Lambda
        action: 報告件数チェック
        service: DynamoDB
        detail: 同一toiletIdのaccepted報告数を集計

      - actor: Lambda
        action: EventBridge にイベント発行
        service: EventBridge
        detail: ReportThresholdReached
        condition: accepted報告が3件以上

      - actor: EventBridge → Lambda
        action: トイレステータスを removed に更新
        service: DynamoDB
        detail: マップから非表示化

  # --- ③ 緊急トイレナビ ---
  emergency_navigation:
    name: 「今すぐトイレに行きたい！」ナビゲーション
    steps:
      - actor: ユーザー
        action: 「今すぐトイレに行きたい！」ボタンタップ
        service: Frontend
        detail: 現在位置を取得

      - actor: Frontend
        action: ルート提案リクエスト
        service: API Gateway → Lambda
        endpoint: POST /navigation/route
        detail: lat, lng, maxResults

      - actor: Lambda
        action: 周辺のactiveトイレを検索
        service: DynamoDB
        detail: geohashベースで近傍検索

      - actor: Lambda
        action: 各トイレへの経路計算
        service: Location Service
        detail: CalculateRoute (Walking)

      - actor: Lambda
        action: AI提案文生成
        service: Bedrock
        detail: |
          距離・所要時間・トイレ個数等を入力に
          最適な行き先を自然言語で提案

      - actor: Lambda
        action: ルート情報+提案文を返却
        service: API Gateway
        detail: RouteResponse (suggestion + routes[])

      - actor: Frontend
        action: 地図上にルート描画 + 提案文表示
        service: Frontend
        detail: ポリラインで経路表示、ターンバイターンナビ

  # --- ④ トイレ不在エリア通知 ---
  absence_notification:
    name: 周辺1km以内トイレ不在通知
    steps:
      - actor: ユーザー
        action: デバイストークン登録
        service: API Gateway → Lambda → End User Messaging Push
        endpoint: PUT /notifications/device

      - actor: Frontend (バックグラウンド)
        action: 定期的に現在位置を送信
        service: API Gateway → Lambda
        endpoint: POST /notifications/location
        detail: Geolocation API で取得した lat, lng

      - actor: Lambda
        action: 周辺1km以内のactiveトイレを検索
        service: DynamoDB
        detail: geohashベースで近傍検索

      - actor: Lambda
        action: トイレ0件の場合、EventBridge にイベント発行
        service: EventBridge
        detail: ToiletAbsenceDetected
        condition: 1km以内にトイレが0件

      - actor: EventBridge → End User Messaging Push
        action: プッシュ通知送信
        service: End User Messaging Push → FCM/APNs
        detail: |
          「周辺にトイレがありません。
          早めにトイレを済ませておきましょう。」

# ============================================================
# フロントエンド画面構成
# ============================================================
frontend:
  pages:
    - name: ログイン / 新規登録
      path: /auth
      description: Cognito認証画面

    - name: マップ（ホーム）
      path: /
      description: |
        トイレ・コンビニをピン表示。
        「今すぐトイレに行きたい！」ボタン常設。

    - name: トイレ登録
      path: /toilets/new
      description: |
        コンビニ選択後、画像・個数・許可要否・その他を入力して送信。

    - name: トイレ詳細
      path: /toilets/:id
      description: |
        トイレ画像・情報表示。「トイレなし報告」ボタン。

    - name: トイレなし報告
      path: /toilets/:id/report
      description: 証拠画像アップロード + 理由入力。

    - name: ナビゲーション
      path: /navigation
      description: ルート提案結果表示 + 地図上ナビ。

    - name: 通知設定
      path: /settings/notifications
      description: プッシュ通知のON/OFF。

  map:
    provider: Amazon Location Service
    sdk: MapLibre GL JS
    features:
      - コンビニ店舗ピン表示
      - トイレ登録済み店舗のハイライト
      - 現在位置表示
      - ルートポリライン描画
      - ジオフェンス（1km圏内可視化）
